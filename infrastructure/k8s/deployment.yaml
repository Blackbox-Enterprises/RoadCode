apiVersion: apps/v1
kind: Deployment
metadata:
  name: roadcode-api
  namespace: blackroad
  labels:
    app: roadcode
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roadcode
      component: api
  template:
    metadata:
      labels:
        app: roadcode
        component: api
    spec:
      containers:
        - name: api
          image: blackroad/roadcode:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: roadcode-secrets
                  key: database-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: roadcode-api
  namespace: blackroad
spec:
  selector:
    app: roadcode
    component: api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
