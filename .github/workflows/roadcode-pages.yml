name: RoadCode Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: roadcode-pages-blackbox-enterprises
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PROJECT_NAME: blackbox-enterprises-roadcode
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check Cloudflare config
        id: cf
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" || -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare credentials not configured; skipping Cloudflare Pages deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.cf.outputs.configured == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install Wrangler
        if: steps.cf.outputs.configured == 'true'
        shell: bash
        run: npm install -g wrangler@4

      - name: Ensure Pages Project Exists
        if: steps.cf.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          LOG_FILE="$(mktemp)"
          if wrangler pages project create "$PROJECT_NAME" --production-branch main >"$LOG_FILE" 2>&1; then
            cat "$LOG_FILE"
          elif grep -qi "already exists" "$LOG_FILE"; then
            cat "$LOG_FILE"
          else
            cat "$LOG_FILE"
            exit 1
          fi

      - name: Deploy Static Site
        if: steps.cf.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          wrangler pages deploy site --project-name "$PROJECT_NAME" --commit-dirty=true
