# .github/workflows/connector-email.yml
# Email digest connector — sends weekly summary via GitHub notifications
# No secrets needed — uses GitHub's built-in notification system

name: "Connector: Email Digest"

on:
  schedule:
    - cron: '0 15 * * 5'  # Friday 3pm UTC — weekly digest
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    name: "Weekly Digest"
    runs-on: ubuntu-latest

    steps:
      - name: Generate and post digest
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
            const org = 'BlackRoad-OS-Inc';

            // Collect stats
            let totalCommits = 0, totalPRs = 0, totalIssuesClosed = 0;
            const activeRepos = [];

            const keyRepos = ['blackroad-operator', 'blackroad', 'RoadCode', 'road-search', 'openclaw', 'memory'];
            for (const repo of keyRepos) {
              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner: org, repo, since: oneWeekAgo, per_page: 100
                });
                if (commits.length > 0) {
                  activeRepos.push({ repo, commits: commits.length });
                  totalCommits += commits.length;
                }

                const { data: prs } = await github.rest.pulls.list({
                  owner: org, repo, state: 'closed', sort: 'updated', per_page: 20
                });
                const mergedThisWeek = prs.filter(p => p.merged_at && new Date(p.merged_at) > new Date(oneWeekAgo));
                totalPRs += mergedThisWeek.length;

                const { data: issues } = await github.rest.issues.listForRepo({
                  owner: org, repo, state: 'closed', since: oneWeekAgo, per_page: 50
                });
                totalIssuesClosed += issues.filter(i => !i.pull_request).length;
              } catch {}
            }

            // Get open issue count
            let openIssues = 0;
            for (const repo of keyRepos) {
              try {
                const { data } = await github.rest.issues.listForRepo({
                  owner: org, repo, state: 'open', per_page: 1
                });
                openIssues += parseInt(data[0]?.number || 0);
              } catch {}
            }

            const digest = `## BlackRoad OS — Weekly Digest (${new Date().toISOString().split('T')[0]})

### This Week
- **${totalCommits}** commits across ${activeRepos.length} repos
- **${totalPRs}** PRs merged
- **${totalIssuesClosed}** issues closed

### Most Active
${activeRepos.sort((a, b) => b.commits - a.commits).map(r => `- **${r.repo}**: ${r.commits} commits`).join('\n')}

### Health
- Open issues: ~${openIssues}
- Active repos this week: ${activeRepos.length}/${keyRepos.length}

---
*Generated by BlackRoad Email Digest Connector*`;

            // Post as issue (triggers email notification if watching)
            await github.rest.issues.create({
              owner: org, repo: 'blackroad-operator',
              title: `📊 Weekly Digest — ${new Date().toISOString().split('T')[0]}`,
              body: digest,
              labels: ['digest', 'automated']
            });
            console.log('Weekly digest posted');
