environment: production
fleet:
  gateway: 192.168.4.49
  inference: 192.168.4.96
  platform: 192.168.4.101
  edge: 192.168.4.98
  dns: 192.168.4.38

services:
  gateway:
    port: 8000
    workers: 4
  search:
    port: 8001
    index_path: /data/indexes
  inference:
    port: 11434
    default_model: llama3.2:3b

monitoring:
  interval: 60
  alerts: true
  retention_days: 30

security:
  tls: true
  auth_required: true
  rate_limit: 100
